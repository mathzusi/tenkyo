<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>天気ョヒントサイト</title>

<style>
body{
    margin:0;
    background:#29cbe4;
    color:white;
    font-family:sans-serif;
}

header{
    padding:18px 20px;
    text-align:center;
    font-size:30px;
    font-weight:bold;
    letter-spacing:4px;
    border-bottom:3px solid #91e4ff;
}

.container{
    max-width:720px;
    margin:auto;
    padding:20px;
}

/* カード全体 */
.カード{
    background:#1a1a1a;
    border:3px solid #ffb92c;
    border-radius:18px;
    margin-bottom:22px;
    overflow:hidden;
}

/* メインボタン */
.メインボタン{
    width:100%;
    background:#ffc60c;
    border:none;
    color:white;
    padding:14px;
    font-size:24px;
    font-weight:bold;
    text-align:left;
    cursor:pointer;

    display:flex;
    justify-content:space-between;
    align-items:center;
}

/* 線 */
.セクションエリア{
    display:none;
    border-top:3px solid #ffb92c;
}

/* ヒントボタン */
.ヒントボタン{
    width:100%;
    background:#60b4f9;
    border:none;
    border-top:2px solid #179edc;
    color:white;
    padding:7px 22px;
    font-size:16px;
    text-align:left;
    cursor:pointer;

    display:flex;
    justify-content:space-between;
    align-items:center;
}

/* 右寄せ用ヒントボタン */
.右ヒントボタン{
    width:100%;
    margin-left:auto;
    border-top:none;
}

/* ネストヒント用 */
.ネストヒント{
    padding:0 !important;
    border-top:none !important;
    background:#ffed9b !important;
}

/* 右ヒント用の線 */
.右ヒント枠{
    margin-left:40px;
    border-top:2px solid #179edc;
}

/* 右寄せ用ヒント内容 */
.右ヒント内容{
    margin-left:40px;
}

/* 矢印 */
.矢印{
    font-size:20px;
    transition:0.2s;
}

/* 開いた時の矢印 */
.open .矢印{
    transform:rotate(90deg);
}

/* ヒント内容 */
.ヒント内容{
    display:none;
    padding:7px;
    background:#ffffff;
    border-top:2px solid #179edc;
    line-height:1.9;
    color:#295b98;
}

/* 常に表示するヒント */
.固定ヒント{
    display:block;
}

</style>

</head>

<body>

<header>
天気ョ ヒントサイト
</header>

<div class="container">

<!-- 第1の謎 -->
<div class="カード">

    <button class="メインボタン" onclick="toggleSection(this, 'nazo1')">
        <span>第1の謎</span>
        <span class="矢印">▶</span>
    </button>

    <div class="セクションエリア" id="nazo1">

        <button class="ヒントボタン" onclick="toggleSection(this, 'hint1')">
            <span>ヒント1</span>
            <span class="矢印">▶</span>
        </button>

    <div class="ヒント内容 ネストヒント" id="hint1">

        <div class="右ヒント枠">

        <button class="ヒントボタン 右ヒントボタン" onclick="toggleSection(this, 'hint1_1')">
             <span>ヒント1-1</span>
             <span class="矢印">▶</span>
        </button>
        
        <div class="ヒント内容" id="hint1_1">
            色に注目してみましょう。
        </div>


        <button class="ヒントボタン" onclick="toggleSection(this, 'hint1_2')">
            <span>ヒント1-2</span>
            <span class="矢印">▶</span>
        </button>


        <div class="ヒント内容" id="hint1_2">
            特に赤色が重要です。
        </div>

        </div>

    </div>

       <button class="ヒントボタン" onclick="toggleSection(this, 'hint2')">
    <span>ヒント2</span>
    <span class="矢印">▶</span>
</button>

<div class="ヒント内容 ネストヒント" id="hint2">

    <div class="ヒント内容 固定ヒント">
        赤・青・黄の順番が重要です。
    </div>

    <div class="右ヒント枠">

        <button class="ヒントボタン 右ヒントボタン"
        onclick="toggleSection(this, 'hint2_1')">

            <span>追加ヒント</span>
            <span class="矢印">▶</span>

        </button>

    </div>

    <div class="ヒント内容 右ヒント内容" id="hint2_1">
        信号機をイメージしてください。
    </div>

</div>

</div>

</div>

<!-- 調査の謎 -->
<div class="カード">

    <button class="メインボタン" onclick="toggleSection(this, 'nazo2')">
        <span>調査の謎</span>
        <span class="矢印">▶</span>
    </button>

    <div class="セクションエリア" id="nazo2">

     <button class="ヒントボタン" onclick="toggleSection(this, 'hint3')">
        <span>地点A</span>
        <span class="矢印">▶</span>
    </button>

        <div class="ヒント内容 ネストヒント" id="hint3">

        <div class="右ヒント枠">

        <button class="ヒントボタン 右ヒントボタン"
        onclick="toggleSection(this, 'hint3_1')">

            <span>A-1</span>
            <span class="矢印">▶</span>

        </button>

    </div>

    <div class="ヒント内容 右ヒント内容" id="hint3_1">
        7:05の投稿の1枚目がA地点と一致しているようです
    </div>

    <div class="右ヒント枠">

        <button class="ヒントボタン 右ヒントボタン"
        onclick="toggleSection(this, 'hint3_2')">

            <span>A-2</span>
            <span class="矢印">▶</span>

        </button>

        </div>

        <div class="ヒント内容 右ヒント内容" id="hint3_2">
            背景の建物の形に注目してください
        </div>

        <div class="右ヒント枠">

        <button class="ヒントボタン 右ヒントボタン"
        onclick="toggleSection(this, 'hint3_3')">

            <span>A-3</span>

        </button>

        </div>

        <div class="ヒント内容 右ヒント内容" id="hint3_3">

        </div>

        </div>

         <button class="ヒントボタン" onclick="toggleSection(this, 'hint4')">
        <span>地点B</span>
        <span class="矢印">▶</span>
    </button>

        <div class="ヒント内容 ネストヒント" id="hint4">

        <div class="右ヒント枠">

        <button class="ヒントボタン 右ヒントボタン"
        onclick="toggleSection(this, 'hint4_1')">

            <span>B-1</span>
            <span class="矢印">▶</span>

        </button>

    </div>

    <div class="ヒント内容 右ヒント内容" id="hint4_1">
        7:00の投稿の写真がB地点と一致しているようです
    </div>

    <div class="右ヒント枠">

        <button class="ヒントボタン 右ヒントボタン"
        onclick="toggleSection(this, 'hint4_2')">

            <span>B-2</span>
            <span class="矢印">▶</span>

        </button>

        </div>

        <div class="ヒント内容 右ヒント内容" id="hint4_2">
            背景の建物の形に注目してください
        </div>

        <div class="右ヒント枠">

        <button class="ヒントボタン 右ヒントボタン"
        onclick="toggleSection(this, 'hint4_3')">

            <span>B-3</span>
            <span class="矢印">▶</span>

        </button>

        </div>

        <div class="ヒント内容 右ヒント内容" id="hint4_3">
        時計台の近くの場所です
        </div>

        </div>

        <button class="ヒントボタン" onclick="toggleSection(this, 'hint5')">
            <span>地点C</span>
            <span class="矢印">▶</span>
        </button>

        <div class="ヒント内容" id="hint5">
            最後の文字から読むと意味が通ります。
        </div>

        <button class="ヒントボタン" onclick="toggleSection(this, 'hint6')">
            <span>地点D</span>
            <span class="矢印">▶</span>
        </button>

        <div class="ヒント内容" id="hint6">
            最後の文字から読むと意味が通ります。
        </div>

        <button class="ヒントボタン" onclick="toggleSection(this, 'hint7')">
            <span>地点E</span>
            <span class="矢印">▶</span>
        </button>

        <div class="ヒント内容" id="hint7">
            最後の文字から読むと意味が通ります。
        </div>

        <button class="ヒントボタン" onclick="toggleSection(this, 'hint8')">
            <span>地点F</span>
            <span class="矢印">▶</span>
        </button>

        <div class="ヒント内容" id="hint8">
            最後の文字から読むと意味が通ります。
        </div>


    </div>

</div>

</div>

<script>
function toggleSection(button, id){

    const content = document.getElementById(id);

    if(content.style.display === "block"){

        /* 閉じる */
        content.style.display = "none";
        button.classList.remove("open");

        /* 中のヒントも全部閉じる */
        const openedHints = content.querySelectorAll('.ヒント内容:not(.固定ヒント), .セクションエリア');

        openedHints.forEach(function(item){
            item.style.display = "none";
        });

        /* 矢印も戻す */
        const openedButtons = content.querySelectorAll('.open');

        openedButtons.forEach(function(item){
            item.classList.remove("open");
        });

    }else{

        /* 開く */
        content.style.display = "block";
        button.classList.add("open");

    }

}
</script>

</body>
</html>
